services:
  postgres:
    image: postgres:16
    container_name: network_sim_postgres
    environment:
      POSTGRES_DB: network_sim
      POSTGRES_USER: network_user
      POSTGRES_PASSWORD: network_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
